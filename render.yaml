services:
  - type: web
    name: ecomerce-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: NODE_ENV=development npm ci && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: WEB_URL
        value: https://ecomerce-web.vercel.app
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_STORE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: CJ_API_EMAIL
        sync: false
      - key: CJ_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SHIPPO_API_KEY
        sync: false

      # Set manually in Render dashboard if not using Blueprint sync:
      # TELEGRAM_BOT_TOKEN
      # TELEGRAM_CHAT_ID
      # TELEGRAM_ALLOWED_CHAT_IDS
