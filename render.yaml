services:
  - type: web
    name: ecomerce-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: NODE_ENV=development npm ci && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build --workspace=packages/db && npm run build --workspace=packages/utils && npm run build --workspace=packages/config && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: 'postgresql://postgres.tzflwwbokrsxfibmqirm:S8?e_TE&A4uG!/2@aws-1-us-east-2.pooler.supabase.com:5432/postgres'
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # ─── Set manually in Render dashboard ─────────────────────────
      # WEB_URL              → https://ecomerce-web.vercel.app
      # MERCADOPAGO_ACCESS_TOKEN
      # MERCADOPAGO_PUBLIC_KEY
      # TELEGRAM_BOT_TOKEN
      # TELEGRAM_CHAT_ID
      # TELEGRAM_ALLOWED_CHAT_IDS
      # CJ_API_EMAIL
      # CJ_API_KEY
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_API_SECRET
