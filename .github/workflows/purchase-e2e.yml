name: Purchase E2E

on:
  workflow_run:
    workflows: ['Deploy']
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  public-purchase-flow:
    name: Public Purchase Flow
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: apps/web
    env:
      BASE_URL: https://ecomerce-web.vercel.app
      E2E_STORE_SLUG: tienda-demo
      E2E_PRODUCT_ID: cmogce3ds000jeqaeyvvnzapz
      E2E_PRODUCT_NAME: Kit Ring Light 26cm con Tripode 2m para Streaming
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run public purchase flow
        run: npm run test:e2e -- --project=chromium e2e/public-purchase-flow.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: purchase-e2e-playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: purchase-e2e-test-results
          path: apps/web/test-results/
          retention-days: 7
