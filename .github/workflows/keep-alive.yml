name: Render Keep-Alive

on:
  schedule:
    # Every 14 minutes (Render free tier spins down after 15 min of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping-api:
    name: Ping Render API
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Health Check
        run: |
          START_TIME=$(date +%s%N)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ecomerce-api-zulc.onrender.com/api/health" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5)
          END_TIME=$(date +%s%N)
          RESPONSE_TIME_MS=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "Response code: $RESPONSE in ${RESPONSE_TIME_MS}ms"
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "API is awake!"
          else
            echo "Warning: Unexpected response code $RESPONSE"
          fi
