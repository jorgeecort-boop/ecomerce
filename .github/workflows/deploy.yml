name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      API_HEALTH_URL: https://ecomerce-api-zulc.onrender.com/api/health
    steps:
      - name: Trigger deploy on Render
        run: |
          DEPLOY=$(curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Deploy triggered: $(echo $DEPLOY | grep -o '"id":"[^"]*"' | head -1)"

      - name: Wait and verify health
        run: |
          echo "Waiting 120s for Render deploy startup..."
          sleep 120

          max_attempts=24
          delay_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            body_file="$(mktemp)"
            status=$(curl -sS -o "$body_file" -w "%{http_code}" \
              --max-time 30 \
              "$API_HEALTH_URL") || status="000"

            echo "Health check attempt ${attempt}/${max_attempts}: status=${status}"

            if [ "$status" = "200" ]; then
              echo "API health check passed."
              cat "$body_file"
              rm -f "$body_file"
              echo "Deploy successful!"
              exit 0
            fi

            echo "API not ready yet. Response body:"
            cat "$body_file" || true
            rm -f "$body_file"

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"
            fi
          done

          echo "Health check failed after $max_attempts attempts."
          exit 1
