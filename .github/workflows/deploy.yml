name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: /opt/ecomerce
        run: |
          ssh -o StrictHostKeyChecking=no -T $VPS_USER@$VPS_HOST << 'REMOTE_SCRIPT'
            set -e
            cd /opt/ecomerce
            git pull origin main
            docker compose -f infra/docker/docker-compose.prod.yml up -d --build
            docker compose -f infra/docker/docker-compose.prod.yml exec -T api npx prisma migrate deploy --schema=./packages/db/prisma/schema.prisma
            sleep 10
            curl -f http://localhost:3001/api/health || exit 1
            curl -f -o /dev/null -s -w "%{http_code}" http://localhost:3000/ | grep -q 200 || exit 1
            echo "Deploy successful"
          REMOTE_SCRIPT
