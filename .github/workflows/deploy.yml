name: Deploy to Render

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    name: Trigger Render deploy + health check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy trigger"
            exit 0
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Health check polling
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ecomerce-api-zulc.onrender.com/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "API healthy after $((i*10))s"
              exit 0
            fi
            echo "Attempt $i/24: status $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 4 minutes"
          exit 1
