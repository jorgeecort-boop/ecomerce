name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on Render
        run: |
          DEPLOY=$(curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Deploy triggered: $(echo $DEPLOY | grep -o '"id":"[^"]*"' | head -1)"

      - name: Wait and verify health
        run: |
          echo "Waiting 90s for deploy to complete..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ecomercio-api-zulc.onrender.com/api/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Deploy successful!"
