version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecomerce-postgres
    environment:
      POSTGRES_USER: ecomerce
      POSTGRES_PASSWORD: ecomerce_dev
      POSTGRES_DB: ecomerce
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecomerce -d ecomerce']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecomerce-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecomerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ecomerce
      RABBITMQ_DEFAULT_PASS: ecomerce_dev
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: ecomerce-network
