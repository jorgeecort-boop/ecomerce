services:
  # ─── DATABASE ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecomerce-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecomerce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecomerce_prod_secure}
      POSTGRES_DB: ecomerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecomerce-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecomerce']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecomerce-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_prod_secure}
    volumes:
      - redis_data:/data
    networks:
      - ecomerce-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_prod_secure}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (NestJS) ──────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: ecomerce-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ecomerce:${POSTGRES_PASSWORD:-ecomerce_prod_secure}@postgres:5432/ecomerce
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_prod_secure}@redis:6379
      - API_URL=https://ecomerce.viralreels.com
      - WEB_URL=https://ecomerce.viralreels.com
      - NEXT_PUBLIC_API_URL=https://ecomerce.viralreels.com/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecomerce-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── WEB (Next.js) ─────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: ecomerce-web
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://ecomerce.viralreels.com/api
    depends_on:
      - api
    networks:
      - ecomerce-net

  # ─── NGINX (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ecomerce-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    networks:
      - ecomerce-net

  # ─── CERTBOT (SSL) ─────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: ecomerce-certbot
    volumes:
      - ../certbot/conf:/etc/letsencrypt
      - ../certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ecomerce-net

volumes:
  postgres_data:
  redis_data:

networks:
  ecomerce-net:
    driver: bridge
